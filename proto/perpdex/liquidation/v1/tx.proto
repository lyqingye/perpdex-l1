syntax = "proto3";
package perpdex.liquidation.v1;

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";

option go_package = "github.com/perpdex/perpdex-l1/x/liquidation/types";

service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc Liquidate(MsgLiquidate) returns (MsgLiquidateResponse);
  rpc Deleverage(MsgDeleverage) returns (MsgDeleverageResponse);
}

message MsgLiquidate {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 victim_account_index = 2;
  uint32 market_index = 3;
  uint64 base_amount = 4;
}
message MsgLiquidateResponse {}

message MsgDeleverage {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 victim_account_index = 2;
  uint32 market_index = 3;
  uint64 deleverager_account_index = 4;
  uint64 base_amount = 5;
}
message MsgDeleverageResponse {}
