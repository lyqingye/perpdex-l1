syntax = "proto3";
package perpdex.account.v1;

import "gogoproto/gogo.proto";

option go_package = "github.com/perpdex/perpdex-l1/x/account/types";

// Account is the perpdex account record. Master and sub accounts share this
// structure; the discriminator is the index range plus account_type.
message Account {
  uint64 account_index = 1;
  uint64 master_account_index = 2;
  string owner_address = 3;
  uint32 account_type = 4;
  uint32 account_trading_mode = 5;
  string collateral = 6 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  int64 total_order_count = 7;
  int64 total_non_cross_order_count = 8;
  int64 cancel_all_time = 9;
  int64 created_at = 10;
  // public_pool_shares lists this account's LP positions across pools
  // (one entry per pool the account has minted into). Capped by
  // SharesListSize on the keeper write path.
  repeated PublicPoolShare public_pool_shares = 11 [(gogoproto.nullable) = false];
  // public_pool_info is set only when account_type is PUBLIC_POOL or
  // INSURANCE_FUND; nil for regular master/sub accounts.
  PublicPoolInfo public_pool_info = 12;
}

// PublicPoolShare is one LP entry on a regular account (mint/burn record).
message PublicPoolShare {
  uint64 public_pool_index = 1;
  string share_amount = 2 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  // principal_amount is the cumulative USDC the LP has deposited into
  // this pool (operator-fee profit math compares burn proceeds against
  // this value). Subsequent mints add; partial burns reduce
  // proportionally to share fraction burnt.
  string principal_amount = 3 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  // entry_timestamp is overwritten on every successful non-operator
  // mint with the block time. Used for the LLP burn cooldown gate.
  int64 entry_timestamp = 4;
}

// PublicPoolInfo lives on the pool's sub-account itself. operator_fee
// and min_operator_share_rate are fee-tick / share-tick quantised.
message PublicPoolInfo {
  uint32 status = 1;                  // 0=ACTIVE, 1=FROZEN
  uint32 operator_fee = 2;            // FeeTick precision
  uint32 min_operator_share_rate = 3; // ShareTick precision
  string total_shares = 4 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  string operator_shares = 5 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  // strategies is a fixed-length bookkeeping array for INSURANCE_FUND
  // accounts. Length is always NbStrategies on write; keeper enforces
  // the invariant. Strategies live INSIDE the pool's collateral pool;
  // sum may be less than collateral (the residual is "unbucketed").
  repeated string strategies = 6 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// AccountAsset stores spot asset balances per (account, asset).
message AccountAsset {
  uint64 account_index = 1;
  uint32 asset_index = 2;
  string balance = 3 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  string locked_balance = 4 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  uint32 margin_mode = 5;
}

// AccountPosition stores a perp position for (account, market). Base size is
// signed: base_size < 0 is short and opens with an ask; base_size >= 0 is long
// and opens with a bid.
message AccountPosition {
  uint64 account_index = 1;
  uint32 market_index = 2;
  string base_size = 3 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  string entry_quote = 4 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  string last_funding_rate_prefix_sum = 5 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  uint32 initial_margin_fraction = 6;
  uint32 margin_mode = 7;
  string allocated_margin = 8 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  int64 total_order_count = 9;
  int64 total_position_tied_order_count = 10;
  int64 created_at = 11;
}

// AccountMeta tracks low-frequency-write counters per account.
message AccountMeta {
  uint64 account_index = 1;
  int64 next_client_order_index = 2;
}

// Params is module-wide configuration for x/account.
message Params {
  uint64 treasury_account_index = 1;
  uint64 insurance_fund_account_index = 2;
  uint64 min_partial_transfer_amount = 3;
  uint64 min_partial_withdraw_amount = 4;
  // liquidity_pool_index is the canonical liquidity pool subject to
  // burn-cooldown gating. Mirrors lighter system_config.liquidity_pool_index.
  // Defaults to InsuranceFundOperatorAccountIdx; cleared if that pool
  // is later frozen via MsgUpdatePublicPool.
  uint64 liquidity_pool_index = 5;
  // liquidity_pool_cooldown_period_ms is the minimum elapsed wall-clock
  // (ms) between a non-operator mint and the matching burn for the LLP
  // pool. Mirrors lighter system_config.liquidity_pool_cooldown_period.
  int64 liquidity_pool_cooldown_period_ms = 6;
}

// Counters keeps next-available account indexes.
message Counters {
  uint64 next_master_account_index = 1;
  uint64 next_sub_account_index = 2;
}
