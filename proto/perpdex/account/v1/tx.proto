syntax = "proto3";
package perpdex.account.v1;

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "perpdex/account/v1/account.proto";

option go_package = "github.com/perpdex/perpdex-l1/x/account/types";

service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc Deposit(MsgDeposit) returns (MsgDepositResponse);
  rpc Withdraw(MsgWithdraw) returns (MsgWithdrawResponse);
  rpc CreateSubAccount(MsgCreateSubAccount) returns (MsgCreateSubAccountResponse);
  rpc UpdateAccountConfig(MsgUpdateAccountConfig) returns (MsgUpdateAccountConfigResponse);
  rpc UpdateAccountAssetConfig(MsgUpdateAccountAssetConfig) returns (MsgUpdateAccountAssetConfigResponse);
  rpc Transfer(MsgTransfer) returns (MsgTransferResponse);
  rpc UpdateMargin(MsgUpdateMargin) returns (MsgUpdateMarginResponse);
  rpc UpdateLeverage(MsgUpdateLeverage) returns (MsgUpdateLeverageResponse);
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // Public pool / Insurance fund.
  rpc CreatePublicPool(MsgCreatePublicPool) returns (MsgCreatePublicPoolResponse);
  rpc UpdatePublicPool(MsgUpdatePublicPool) returns (MsgUpdatePublicPoolResponse);
  rpc MintShares(MsgMintShares) returns (MsgMintSharesResponse);
  rpc BurnShares(MsgBurnShares) returns (MsgBurnSharesResponse);
  rpc StrategyTransfer(MsgStrategyTransfer) returns (MsgStrategyTransferResponse);
  rpc ForceBurnShares(MsgForceBurnShares) returns (MsgForceBurnSharesResponse);
}

message MsgDeposit {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string beneficiary = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint32 asset_index = 3;
  uint32 route_type = 4;
  uint64 amount = 5;
}

message MsgDepositResponse {
  uint64 account_index = 1;
}

message MsgWithdraw {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 account_index = 2;
  uint32 asset_index = 3;
  uint32 route_type = 4;
  uint64 amount = 5;
  string destination_address = 6 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MsgWithdrawResponse {}

message MsgCreateSubAccount {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 master_account_index = 2;
}

message MsgCreateSubAccountResponse {
  uint64 sub_account_index = 1;
}

message MsgUpdateAccountConfig {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 account_index = 2;
  uint32 new_trading_mode = 3;
}

message MsgUpdateAccountConfigResponse {}

message MsgUpdateAccountAssetConfig {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 account_index = 2;
  uint32 asset_index = 3;
  uint32 new_margin_mode = 4;
}

message MsgUpdateAccountAssetConfigResponse {}

message MsgTransfer {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 from_account_index = 2;
  uint64 to_account_index = 3;
  uint32 asset_index = 4;
  uint64 amount = 5;
  bytes memo = 6;
}

message MsgTransferResponse {}

message MsgUpdateMargin {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 account_index = 2;
  uint32 market_index = 3;
  uint32 action = 4;
  string amount = 5 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

message MsgUpdateMarginResponse {}

message MsgUpdateLeverage {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 account_index = 2;
  uint32 market_index = 3;
  uint32 new_initial_margin_fraction = 4;
  uint32 new_margin_mode = 5;
}

message MsgUpdateLeverageResponse {}

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [(gogoproto.nullable) = false];
}

message MsgUpdateParamsResponse {}

// MsgCreatePublicPool initialises a new sub-account as a Public Pool.
// Sender must be the master's owner. The master's collateral funds the
// initial total_shares at INITIAL_POOL_SHARE_VALUE each. `account_type`
// must be PUBLIC_POOL: the canonical Insurance Fund pool lives at
// `InsuranceFundOperatorAccountIdx` and is seeded by genesis — its state
// is mutated via `MsgUpdatePublicPool` / `MsgStrategyTransfer` under
// governance authority, not through this Msg.
message MsgCreatePublicPool {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 master_account_index = 2;
  uint32 account_type = 3; // must be PUBLIC_POOL; INSURANCE_FUND is genesis-only
  uint64 initial_total_shares = 4;
  uint32 operator_fee = 5;            // FeeTick precision
  uint32 min_operator_share_rate = 6; // ShareTick precision
}

message MsgCreatePublicPoolResponse {
  uint64 pool_account_index = 1;
}

// MsgUpdatePublicPool flips status / lowers operator_fee / changes
// min_operator_share_rate. Sender must be the pool's master owner. The
// pool must be ACTIVE; freezing requires HEALTHY + no positions + no
// open orders. operator_fee can only DECREASE.
message MsgUpdatePublicPool {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 pool_account_index = 2;
  uint32 new_status = 3;
  uint32 new_operator_fee = 4;
  uint32 new_min_operator_share_rate = 5;
}

message MsgUpdatePublicPoolResponse {}

// MsgMintShares deposits USDC collateral from sender's master account
// into the pool, increasing total_shares (and operator_shares iff
// sender is the pool operator). principal_amount is in uusdc.
message MsgMintShares {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 pool_account_index = 2;
  uint64 principal_amount = 3;
}

message MsgMintSharesResponse {
  string share_amount = 1 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

// MsgBurnShares redeems shares back to USDC at the current NAV.
// Subject to LLP cooldown when the pool is the system liquidity pool
// and sender is non-operator. operator_fee_share is split out of the
// realized profit and credited to operator_shares.
message MsgBurnShares {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 pool_account_index = 2;
  string share_amount = 3 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

message MsgBurnSharesResponse {
  uint64 usdc_amount = 1;
}

// MsgStrategyTransfer reallocates collateral between the IF's strategy
// buckets. Sender must be the pool master owner; pool must be IF and
// not frozen; from != to; strategy[from] must hold >= amount.
message MsgStrategyTransfer {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 pool_account_index = 2;
  uint32 from_strategy = 3;
  uint32 to_strategy = 4;
  string amount = 5 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

message MsgStrategyTransferResponse {}

// MsgForceBurnShares is the gov-authority break-glass burn used by the
// LLP system. Bypasses the cooldown gate. Pool must be the configured
// LLP and INSURANCE_FUND.
message MsgForceBurnShares {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 pool_account_index = 2;
  uint64 depositor_account_index = 3;
  string share_amount = 4 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

message MsgForceBurnSharesResponse {
  uint64 usdc_amount = 1;
}
