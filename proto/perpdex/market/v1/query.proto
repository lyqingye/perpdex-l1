syntax = "proto3";
package perpdex.market.v1;

import "cosmos/base/query/v1beta1/pagination.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "perpdex/market/v1/market.proto";

option go_package = "github.com/perpdex/perpdex-l1/x/market/types";

service Query {
  rpc Market(QueryMarketRequest) returns (QueryMarketResponse) {
    option (google.api.http).get = "/perpdex/market/v1/market/{market_index}";
  }
  rpc MarketDetails(QueryMarketDetailsRequest) returns (QueryMarketDetailsResponse) {
    option (google.api.http).get = "/perpdex/market/v1/market/{market_index}/details";
  }
  rpc Markets(QueryMarketsRequest) returns (QueryMarketsResponse) {
    option (google.api.http).get = "/perpdex/market/v1/markets";
  }
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/perpdex/market/v1/params";
  }
}

message QueryMarketRequest { uint32 market_index = 1; }
message QueryMarketResponse { Market market = 1 [(gogoproto.nullable) = false]; }

message QueryMarketDetailsRequest { uint32 market_index = 1; }
message QueryMarketDetailsResponse { MarketDetails details = 1 [(gogoproto.nullable) = false]; }

message QueryMarketsRequest {
  // market_type is the value to match against when filter_by_type is
  // true. The default value (perps == 0) is indistinguishable from
  // "unset" in proto3, so callers MUST set filter_by_type to opt in
  // to filtering — including when they explicitly want perps.
  uint32 market_type = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
  // filter_by_type toggles the market_type predicate. When false the
  // query returns every market regardless of market_type.
  bool filter_by_type = 3;
}
message QueryMarketsResponse {
  repeated Market markets = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryParamsRequest {}
message QueryParamsResponse { Params params = 1 [(gogoproto.nullable) = false]; }
