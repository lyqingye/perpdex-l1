syntax = "proto3";
package perpdex.funding.v1;

option go_package = "github.com/perpdex/perpdex-l1/x/funding/types";

message FundingMetadata {
  int64 last_funding_round_timestamp = 1;
}

message Params {
  int64 funding_period_ms = 1;
  int64 funding_period_divisor = 2;
  uint32 max_premium_sample_count = 3;
  // max_mark_staleness_ms bounds how old MarketDetails.MarkPrice
  // (written by the funding BeginBlocker via median(impact, idx+EMA,
  // oracle_mark)) is allowed to be before downstream consumers
  // (x/risk, x/trade) MUST treat it as missing. Zero disables the
  // freshness gate entirely (only recommended for tests).
  int64 max_mark_staleness_ms = 4;
}
