syntax = "proto3";
package perpdex.oracle.v1;

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "perpdex/oracle/v1/oracle.proto";

option go_package = "github.com/perpdex/perpdex-l1/x/oracle/types";

// Msg exposes only `UpdateParams` for governance-driven configuration of
// the oracle aggregation tunables (`max_age_ms`, EMA smoothing, deviation
// threshold, etc.). The on-chain price data plane is governed entirely
// by the dydx/Slinky-style ABCI++ vote-extension pipeline (ExtendVote /
// PrepareProposal / ProcessProposal / PreBlocker) and so requires no
// runtime SDK message: prices land on chain as a side-effect of finalising
// a block whose proposer has injected the previous round's
// ExtendedCommitInfo bytes as Txs[0].
service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [(gogoproto.nullable) = false];
}
message MsgUpdateParamsResponse {}
