syntax = "proto3";
package perpdex.oracle.v1;

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "perpdex/oracle/v1/oracle.proto";

option go_package = "github.com/perpdex/perpdex-l1/x/oracle/types";

// Msg exposes only the two messages required by the dydx/Slinky-style
// oracle: AggregateOracleVotes (proposer-injected) and UpdateParams
// (governance). All validator/operator binding and whitelist provider
// messages have been removed; vote extensions are signed directly by the
// validator consensus key.
service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc AggregateOracleVotes(MsgAggregateOracleVotes) returns (MsgAggregateOracleVotesResponse);
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

// MsgAggregateOracleVotes is injected by the block proposer as the first
// transaction of every block (after VoteExtensionsEnableHeight). The
// `authority` field MUST equal the gov module address; the ante chain
// rejects copies of this message coming from regular user transactions
// to prevent bypassing the vote-extension pipeline.
message MsgAggregateOracleVotes {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  int64 height = 2;
  repeated MarketAggregation aggregations = 3 [(gogoproto.nullable) = false];
}
message MsgAggregateOracleVotesResponse {}

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [(gogoproto.nullable) = false];
}
message MsgUpdateParamsResponse {}
