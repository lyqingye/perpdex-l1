syntax = "proto3";
package perpdex.oracle.v1;

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "perpdex/oracle/v1/oracle.proto";

option go_package = "github.com/perpdex/perpdex-l1/x/oracle/types";

service Query {
  rpc OraclePrice(QueryOraclePriceRequest) returns (QueryOraclePriceResponse) {
    option (google.api.http).get = "/perpdex/oracle/v1/price/{market_index}";
  }
  rpc OracleProviders(QueryOracleProvidersRequest) returns (QueryOracleProvidersResponse) {
    option (google.api.http).get = "/perpdex/oracle/v1/providers";
  }
  rpc Bindings(QueryBindingsRequest) returns (QueryBindingsResponse) {
    option (google.api.http).get = "/perpdex/oracle/v1/bindings";
  }
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/perpdex/oracle/v1/params";
  }
}

message QueryOraclePriceRequest { uint32 market_index = 1; }
message QueryOraclePriceResponse { OraclePrice price = 1 [(gogoproto.nullable) = false]; }

message QueryOracleProvidersRequest {}
message QueryOracleProvidersResponse { repeated OracleProvider providers = 1 [(gogoproto.nullable) = false]; }

message QueryBindingsRequest {}
message QueryBindingsResponse { repeated ValidatorOracleBinding bindings = 1 [(gogoproto.nullable) = false]; }

message QueryParamsRequest {}
message QueryParamsResponse { Params params = 1 [(gogoproto.nullable) = false]; }
