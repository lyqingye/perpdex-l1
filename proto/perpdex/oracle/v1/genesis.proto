syntax = "proto3";
package perpdex.oracle.v1;

import "gogoproto/gogo.proto";
import "perpdex/oracle/v1/oracle.proto";

option go_package = "github.com/perpdex/perpdex-l1/x/oracle/types";

message GenesisState {
  Params params = 1 [(gogoproto.nullable) = false];
  repeated OraclePrice prices = 2 [(gogoproto.nullable) = false];
}
