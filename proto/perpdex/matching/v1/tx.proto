syntax = "proto3";
package perpdex.matching.v1;

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "perpdex/matching/v1/matching.proto";

option go_package = "github.com/perpdex/perpdex-l1/x/matching/types";

service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc CreateOrder(MsgCreateOrder) returns (MsgCreateOrderResponse);
  rpc CancelOrder(MsgCancelOrder) returns (MsgCancelOrderResponse);
  rpc CancelAllOrders(MsgCancelAllOrders) returns (MsgCancelAllOrdersResponse);
  rpc ModifyOrder(MsgModifyOrder) returns (MsgModifyOrderResponse);
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

message MsgCreateOrder {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 account_index = 2;
  uint32 market_index = 3;
  uint64 client_order_index = 4;
  bool is_ask = 5;
  uint32 order_type = 6;
  uint32 time_in_force = 7;
  uint64 base_amount = 8;
  uint32 price = 9;
  uint32 trigger_price = 10;
  int64 expiry = 11;
  bool reduce_only = 12;
}

message MsgCreateOrderResponse {
  uint64 order_index = 1;
  uint32 status = 2;
  uint64 filled_base_amount = 3;
}

message MsgCancelOrder {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint32 market_index = 2;
  uint64 order_index = 3;
}
message MsgCancelOrderResponse {}

message MsgCancelAllOrders {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 account_index = 2;
  uint32 market_index_filter = 3; // 0 = all markets
  uint32 mode = 4;
  int64 scheduled_delay_ms = 5;
}
message MsgCancelAllOrdersResponse {}

message MsgModifyOrder {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint32 market_index = 2;
  uint64 order_index = 3;
  uint32 new_price = 4;
  uint64 new_base_amount = 5;
  uint32 new_trigger_price = 6;
}
message MsgModifyOrderResponse {
  uint64 order_index = 1;
}

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [(gogoproto.nullable) = false];
}
message MsgUpdateParamsResponse {}
